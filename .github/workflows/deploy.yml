name: Django CI/CD

on: [push, pull_request]

jobs:
  # ============================================
  # 1. ЛИНТИНГ (проверка качества кода)
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run black (check)
        run: black --check .

      - name: Run isort (check)
        run: isort --check-only .

      - name: Run flake8
        run: flake8 config/ education/ users/ payments/

  # ============================================
  # 2. ТЕСТЫ
  # ============================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432

      - name: Run tests
        run: python manage.py test
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432

  # ============================================
  # 3. БИЛД (сборка Docker образа)
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ============================================
  # 4. ДЕПЛОЙ
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'DEPLOY_SCRIPT'
            echo "Pulling latest changes..."
            cd ${{ secrets.DEPLOY_DIR }}
            git pull origin main

            echo "Creating .env file..."
            cat > .env << 'ENVEOF'
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.SERVER_HOST }},localhost
            ENVEOF

            echo "Stopping old containers..."
            docker compose down

            echo "Building and starting containers..."
            docker compose up -d --build

            echo "Waiting for database to be ready..."
            sleep 10

            echo "Applying migrations..."
            docker compose exec -T web python manage.py migrate

            echo "Collecting static files..."
            docker compose exec -T web python manage.py collectstatic --noinput

            echo "Creating superuser (if not exists)..."
            docker compose exec -T web python manage.py shell -c "
            from django.contrib.auth import get_user_model;
            User = get_user_model();
            if not User.objects.filter(username='admin').exists():
                User.objects.create_superuser('admin', 'admin@example.com', '${{ secrets.ADMIN_PASSWORD }}')
            "

            echo "Deployment complete!"
            echo "Application available at: http://${{ secrets.SERVER_HOST }}"
          DEPLOY_SCRIPT