name: Django CI/CD

on: [push, pull_request]

jobs:
  # ============================================
  # 1. ЛИНТИНГ (проверка качества кода)
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run black (check)
        run: black --check .

      - name: Run isort (check)
        run: isort --check-only .

      - name: Run flake8
        run: flake8 config/ education/ users/ payments/

  # ============================================
  # 2. ТЕСТЫ
  # ============================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432

      - name: Run tests
        run: python manage.py test
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432

  # ============================================
  # 3. БИЛД (сборка Docker образа)
  # ============================================
  build:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: test

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/django-rest-framework:${{ github.sha }} \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/django-rest-framework:latest \
            .

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/django-rest-framework:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/django-rest-framework:latest
  # ============================================
  # 4. ДЕПЛОЙ
  # ============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Copy docker-compose.yml
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:/opt/django-rest-framework/
          
      - name: Copy nginx.conf
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /opt/django-rest-framework/nginx"
          
          scp -o StrictHostKeyChecking=no \
            nginx.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:/opt/django-rest-framework/

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << EOF
            cd /opt/django-rest-framework
            docker compose pull
            docker compose up -d
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --noinput

          EOF